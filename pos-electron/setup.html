<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lucerne POS — Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f; color: #fff;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a1a; border: 1px solid #333; border-radius: 16px;
      padding: 40px; width: 480px; text-align: center;
    }
    .logo { font-size: 28px; font-weight: 700; letter-spacing: 3px; margin-bottom: 8px; }
    .logo span { color: #a78bfa; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 32px; }
    label { display: block; text-align: right; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; background: #111; border: 1px solid #333;
      border-radius: 8px; color: #fff; font-size: 14px; direction: ltr; text-align: left;
      outline: none; margin-bottom: 20px;
    }
    input:focus { border-color: #a78bfa; }
    button {
      width: 100%; padding: 12px; background: #7c3aed; border: none;
      border-radius: 8px; color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    .note { margin-top: 16px; font-size: 11px; color: #555; direction: ltr; text-align: left; }
    .error { color: #f87171; font-size: 12px; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">LUCERNE <span>POS</span></div>
    <div class="subtitle">قم بإدخال رابط متجرك المنشور للبدء</div>

    <label>رابط المتجر المنشور (Deployed URL)</label>
    <input type="url" id="urlInput" placeholder="https://your-app.replit.app" />

    <div class="error" id="errMsg">الرجاء إدخال رابط صحيح يبدأ بـ https://</div>

    <button onclick="save()">🚀 بدء التشغيل / Connect</button>

    <div class="note">
      مثال / Example:<br>
      https://lucerne-boutique.replit.app<br>
      https://lucerne.onrender.com
    </div>
  </div>

  <script>
    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") save();
    });

    async function save() {
      const url = document.getElementById("urlInput").value.trim();
      const err = document.getElementById("errMsg");
      if (!url.startsWith("http")) { err.style.display = "block"; return; }
      err.style.display = "none";
      await window.electronPOS.saveConfig({ url });
    }
  </script>
</body>
</html>
